server:
  secure: false # HTTP pour Connect Gateway
  extraArgs:
    - --auth-mode=server # Commenter pour forcer le login (mode client)
    - --auth-mode=client
    - --timezone=Pacific/Noumea
  extraEnv:
    - name: TZ
      value: Pacific/Noumea
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 250m
      memory: 512Mi

controller:
  workflowNamespaces:
    - data
    - drd-jobs
  extraArgs:
    - --timezone=Pacific/Noumea
  extraEnv:
    - name: TZ
      value: Pacific/Noumea
  resources:
    requests:
      cpu: 250m
      memory: 512Mi

executor:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
