server:
  secure: false # HTTP pour Connect Gateway
  extraArgs:
    - --auth-mode=server # Commenter pour forcer le login (mode client)
    - --auth-mode=client
  extraEnv:
    - name: TZ
      value: Pacific/Noumea
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 250m
      memory: 512Mi

controller:
  extraArgs: []
  extraEnv:
    - name: TZ
      value: Pacific/Noumea
  # En mode cluster-wide (par défaut si singleNamespace=false), 
  # il faut que cette liste soit vide pour surveiller tous les namespaces.
  workflowNamespaces: []
  resources:
    requests:
      cpu: 250m
      memory: 512Mi

executor:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
